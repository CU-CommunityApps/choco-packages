# Response file for the SAS Deployment Wizard
# Generated with the help of Claude AI to reconsile result of running setup.exe -recorded
# with the previous version of this file (was dated 2022)
# it seems like some procuts changed, but this aligns pretty well.
# Reconciled 2026 version, based on the wizard-recorded file plus items
# carried forward from the 2022 file where the current recording session
# didn't reach that screen. Review the #REVIEW comments before using this
# for an unattended deployment.
#
# Select Deployment Task
# Select the deployment task you would like to perform.
#START_TASK=install/depot/manage
START_TASK=install
 
# Specify SAS Home
# Specify the location where SAS software will be installed on this machine.
#SAS_HOME=<full path>
SAS_HOME=C:\Program Files\SASHome

# Select Deployment Type
# Select the type of deployment you want to perform.
#DEPLOYMENT_TYPE=planned/nonplanned/additional
DEPLOYMENT_TYPE=nonplanned
#PLANNED_INSTALL=yes/no
PLANNED_INSTALL=yes
#PLANNED_CONFIGURE=yes/no
PLANNED_CONFIGURE=yes

# Select Products to Install
# Select the products you want to install on this machine.
# Confirmed still available in the current depot. grsgdesigner (SAS Graph
# Template Designer) and activexgraph (SAS/GRAPH ActiveX Control) from the
# 2022 file are no longer offered and have been dropped.
PRODUCT_SELECTION1=dproclient
PRODUCT_SELECTION2=eguide
PRODUCT_SELECTION3=dminewrkstn
PRODUCT_SELECTION4=sasinstall
PRODUCT_SELECTION5=itclient
PRODUCT_SELECTION6=sasoledb
PRODUCT_SELECTION7=webedtr
PRODUCT_SELECTION8=tminewrkstn

# Select SAS Foundation Mode
# Select which mode of SAS Foundation to install.
#SAS_FOUNDATION_MODE=64-bit/32-bit
SAS_FOUNDATION_MODE=64-bit

# Select SAS Enterprise Guide Mode
# Select which mode of SAS Enterprise Guide to install.
#SAS_EG_MODE=32-bit/64-bit
SAS_EG_MODE=64-bit

# Select SAS Foundation Products
# Further customize the software by selecting the SAS Foundation products to install.
# Removed vs. 2022: accelmvaastr, cstframework, dqualityssl, dquality, aster,
# hawq, genetics (all confirmed no longer offered in the current depot).
# Added vs. 2022: cloud (SAS Cloud Data Storage support), yellowbrick
# (SAS/ACCESS Interface to Yellowbrick).
# #REVIEW: "SAS Network Algorithms" was checked in the product-selection
# screenshot but does NOT appear in this list. Confirm whether you want it
# included -- if so, you'll need to re-check it in the wizard and re-record
# to get its actual product code, since it never made it into the recorded
# file.
#SASFOUNDATION_SELECTION=<comma delimited SAS Foundation (MVA) product codes>
SASFOUNDATION_SELECTION=hadoopbasics,base,mapsgeo,mapsgfk,accelmvaastr,accelmvadb2,accelmvagplm,accelmvahadp,accelmvanetz,accelmvaorcl,accelmvahana,accelmvatera,cstframework,dqualityssl,dquality,dmine,hpdmine,hpets,hps,hpstat,hptmine,inttech,scoreaccel,lasreng,graphcomp,spdsclient,txtancomp,txtminspa,tmine,redshift,aster,db2,greenplum,hawq,hadoop,impala,jdbc,mssqlserver,mysql,netezza,odbc,oledb,oracle,pcfile,postgres,r3,sybase,saphana,sybaseiq,sforce,snowflake,teradata,vertica,osisoft,af,assist,connect,eis,ets,fsp,gis,graph,mapssas,genetics,iml,intrnet,or,qc,share,stat

# Specify SAS Installation Data File
# Specify the full path to your SAS installation data file.
#SAS_INSTALLATION_DATA=<full path to file>
SAS_INSTALLATION_DATA=C:\Windows\Temp\SAS94_9D42P2_70084773_Win_X64_Srv.txt

# Select Language Support
# Select the languages for your software to support.
#LANGUAGE_SELECTION=<comma delimited language codes>
LANGUAGE_SELECTION=en,u8

# Select Regional Settings
# Select the appropriate regional settings for your SAS software.
#REGION_SETTING=<region setting code>
REGION_SETTING=en_US
#UNICODE_SERVER=yes/no
UNICODE_SERVER=no

# Default Product for SAS File Types
# Specify the default product that will be used to open SAS file types that are shared by more than one product.
#DEFAULT_PRODUCT_FOR_SAS_FILE_TYPES=<default product to open SAS file types, possible choices are: base, eguide, sasuniviewer or use_existing_option>
DEFAULT_PRODUCT_FOR_SAS_FILE_TYPES=base

# Specify SAS Clinical Standards Toolkit Libraries
# Specify the location for the global standards library and the sample library. The locations must be new directories.
#cstframework.runtime.config.dirpath.global.library=<full path>
cstframework.runtime.config.dirpath.global.library=c:\cstGlobalLibrary
#cstframework.runtime.config.dirpath.sample.library=<full path>
cstframework.runtime.config.dirpath.sample.library=c:\cstSampleLibrary

# Specify SAS Document Conversion Host and Port
# Specify connection information for SAS Document Conversion.
#doc.conversion.host=<text value>
doc.conversion.host=128.84.193.98
#doc.conversion.port=<port number value>
doc.conversion.port=7111

# Select Support Option
# Select the support option you want to use.
#SEND_SUPPORT_LOG_TO_SAS=yes/no
SEND_SUPPORT_LOG_TO_SAS=no
