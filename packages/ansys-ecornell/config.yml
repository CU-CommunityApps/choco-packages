Id:             'ansys-ecornell'
Description:    'ANSYS 2025 R2 SP4 - COECIS License'
Version:        '25.2.04.0'

Install:
  - File:       '%INSTALL_DIR%\setup.exe'
    FileType:   'exe' 
    Arguments:  '-fluent -mechapdl -discoveryreduced -licserverinfo %LIC_SERVER% -silent'
    ExitCodes:  [0]

  - File:       '%INSTALL_DIR%\SPACECLAIM_2025R2\setup.exe'
    FileType:   'exe' 
    Arguments:  '-silent'
    ExitCodes:  [0]
    
Applications:
    ANSYSWB:
        DisplayName:    'Workbench 2025 R2'
        Path:           '%PROGRAMFILES%\ANSYS Inc\v252\Framework\bin\Win64\RunWB2.exe'
        LaunchParams:   ''
        WorkDir:        ''

Files: 
    '%TOOLS_DIR%\ApipUserConfig.txt': '%SYSTEMDRIVE%\Users\Default\AppData\Roaming\Ansys\v252\ApipUserConfig.txt'
